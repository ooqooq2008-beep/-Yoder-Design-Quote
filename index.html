<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>川互設計 - 系統入口網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .hover-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 to-slate-200">
    
    <div class="max-w-4xl w-full animate-[fadeIn_0.5s_ease-out]">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight mb-4">川互設計<span class="text-blue-600"> 數位管理中心</span></h1>
            <p class="text-slate-500 font-medium text-lg">請選擇您要進入的系統</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <a href="quotation.html" class="hover-card bg-white rounded-3xl p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-slate-300 transition-all duration-300 group block relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-slate-700"></div>
                <div class="w-16 h-16 bg-slate-100 text-slate-700 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-slate-700 group-hover:text-white transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">工程報價系統</h2>
                <p class="text-slate-500 text-sm leading-relaxed">提供給業主的標準化報價單生成、內部成本與毛利試算，支援 Excel 匯入及 PDF 輸出。</p>
                <div class="mt-6 flex items-center text-sm font-bold text-slate-600 group-hover:text-slate-900">
                    進入系統 
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ml-2 group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>

            <a href="accounting.html" class="hover-card bg-white rounded-3xl p-8 shadow-sm border border-slate-200 hover:shadow-xl hover:border-blue-200 transition-all duration-300 group block relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">工程帳務中心</h2>
                <p class="text-slate-500 text-sm leading-relaxed">追蹤各案場的業主收款進度、工班發包成本與付款紀錄，即時掌握現金流狀態。</p>
                <div class="mt-6 flex items-center text-sm font-bold text-blue-600 group-hover:text-blue-800">
                    進入系統 
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ml-2 group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>
        </div>
        
        <div class="text-center mt-12 text-slate-400 text-sm">
            &copy; 2024 川互設計. All rights reserved. (雲端同步運行中 ☁️)
        </div>
    </div>
</body>
</html>
